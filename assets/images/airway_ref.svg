<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f9fafb"/>
  
  <!-- Header bar -->
  <rect width="600" height="60" fill="#0f52ba"/>
  <text x="20" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">Airway Management</text>
  
  <!-- Content area -->
  <g transform="translate(30, 90)">
    <!-- Title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1f">Basic Techniques</text>
    
    <!-- Bullet points -->
    <g transform="translate(0, 25)">
      <circle cx="5" cy="-5" r="4" fill="#0f52ba"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Open airway using head tilt-chin lift (if no trauma)</text>
    </g>
    
    <g transform="translate(0, 55)">
      <circle cx="5" cy="-5" r="4" fill="#0f52ba"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Use jaw thrust if cervical spine injury suspected</text>
    </g>
    
    <g transform="translate(0, 85)">
      <circle cx="5" cy="-5" r="4" fill="#0f52ba"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Insert oropharyngeal airway if patient unconscious</text>
    </g>
    
    <g transform="translate(0, 115)">
      <circle cx="5" cy="-5" r="4" fill="#0f52ba"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Consider supraglottic airway device if appropriate</text>
    </g>
    
    <g transform="translate(0, 145)">
      <circle cx="5" cy="-5" r="4" fill="#0f52ba"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Prepare for advanced airway (intubation) if indicated</text>
    </g>
  </g>
  
  <!-- Footer note -->
  <text x="30" y="370" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Demo Reference • Not for clinical use</text>
</svg>
