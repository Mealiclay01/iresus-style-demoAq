<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f9fafb"/>
  
  <!-- Header bar -->
  <rect width="600" height="60" fill="#2563eb"/>
  <text x="20" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">CPR Technique</text>
  
  <!-- Content area -->
  <g transform="translate(30, 90)">
    <!-- Title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1f">High-Quality CPR</text>
    
    <!-- Bullet points -->
    <g transform="translate(0, 25)">
      <circle cx="5" cy="-5" r="4" fill="#2563eb"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Rate: 100-120 compressions per minute</text>
    </g>
    
    <g transform="translate(0, 55)">
      <circle cx="5" cy="-5" r="4" fill="#2563eb"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Depth: At least 5 cm (adult), 1/3 chest depth (child/infant)</text>
    </g>
    
    <g transform="translate(0, 85)">
      <circle cx="5" cy="-5" r="4" fill="#2563eb"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Allow full chest recoil between compressions</text>
    </g>
    
    <g transform="translate(0, 115)">
      <circle cx="5" cy="-5" r="4" fill="#2563eb"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Minimize interruptions (pauses <10 seconds)</text>
    </g>
    
    <g transform="translate(0, 145)">
      <circle cx="5" cy="-5" r="4" fill="#2563eb"/>
      <text x="20" y="0" font-family="Arial, sans-serif" font-size="15" fill="#374151">Switch compressor every 2 minutes to prevent fatigue</text>
    </g>
  </g>
  
  <!-- Footer note -->
  <text x="30" y="370" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Demo Reference • Not for clinical use</text>
</svg>
